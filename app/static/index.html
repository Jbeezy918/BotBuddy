<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoboBuddy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0d0d0d;
            min-height: 100vh;
            color: #f5f5f5;
        }

        /* Setup Screen */
        .setup-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .setup-box {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 48px;
            width: 100%;
            max-width: 440px;
            border: 1px solid #2a2a2a;
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo h1 {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
        }

        .logo p {
            color: #666;
            font-size: 15px;
            margin-top: 8px;
        }

        .section-label {
            font-size: 13px;
            font-weight: 500;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #0d0d0d;
            color: #fff;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #ff6b4a;
        }

        .form-group input::placeholder {
            color: #555;
        }

        /* Selection Grid */
        .select-row {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        .select-btn {
            flex: 1;
            background: #0d0d0d;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .select-btn:hover {
            border-color: #555;
        }

        .select-btn.selected {
            border-color: #ff6b4a;
            background: rgba(255, 107, 74, 0.08);
        }

        .select-btn .emoji {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .select-btn .name {
            font-size: 12px;
            color: #999;
        }

        .select-btn.selected .name {
            color: #ff6b4a;
        }

        /* Buttons */
        .btn-start {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            background: #ff6b4a;
            color: #fff;
            transition: background 0.2s;
            margin-top: 8px;
        }

        .btn-start:hover {
            background: #ff5533;
        }

        .divider {
            text-align: center;
            color: #444;
            font-size: 13px;
            margin: 28px 0;
            position: relative;
        }

        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 35%;
            height: 1px;
            background: #333;
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .btn-account {
            width: 100%;
            padding: 14px;
            border: 1px solid #333;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            background: transparent;
            color: #888;
            transition: all 0.2s;
        }

        .btn-account:hover {
            border-color: #555;
            color: #fff;
        }

        /* Chat Screen */
        .chat-container {
            display: none;
            flex-direction: column;
            height: 100vh;
            background: #0d0d0d;
        }

        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .chat-header-info h2 {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }

        .chat-header-info p {
            font-size: 12px;
            color: #4ade80;
        }

        .chat-header-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .icon-btn {
            background: #2a2a2a;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            color: #888;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            background: #333;
            color: #fff;
        }

        .icon-btn.active {
            background: #ff6b4a;
            color: #fff;
        }

        .memory-count {
            background: #2a2a2a;
            color: #888;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 70%;
            padding: 14px 18px;
            border-radius: 16px;
            line-height: 1.5;
            font-size: 15px;
            animation: slideIn 0.2s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-user {
            background: #ff6b4a;
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message-bot {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            margin-top: 6px;
        }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            padding: 16px 20px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
        }

        .typing-indicator span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #555;
            border-radius: 50%;
            margin-right: 4px;
            animation: pulse 1.2s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes pulse {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }

        .chat-input-area {
            padding: 16px 24px;
            background: #1a1a1a;
            border-top: 1px solid #2a2a2a;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            max-width: 800px;
            margin: 0 auto;
        }

        .chat-input {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid #333;
            border-radius: 12px;
            background: #0d0d0d;
            color: #fff;
            font-size: 15px;
            resize: none;
            max-height: 100px;
        }

        .chat-input:focus {
            outline: none;
            border-color: #ff6b4a;
        }

        .send-btn {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: #ff6b4a;
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 18px;
            transition: background 0.2s;
        }

        .send-btn:hover {
            background: #ff5533;
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .setup-box { padding: 32px 24px; }
            .select-btn .name { font-size: 11px; }
            .message { max-width: 85%; }
            .memory-count { display: none; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- Setup -->
    <div class="setup-container" id="setupScreen">
        <div class="setup-box">
            <div class="logo">
                <h1>RoboBuddy</h1>
                <p>AI that remembers you</p>
            </div>

            <div class="section-label">Your name</div>
            <div class="form-group">
                <input type="text" id="username" placeholder="Optional">
            </div>

            <div class="section-label">Personality</div>
            <div class="select-row" id="personalityRow">
                <div class="select-btn selected" data-value="friendly">
                    <div class="emoji">😊</div>
                    <div class="name">Friendly</div>
                </div>
                <div class="select-btn" data-value="professional">
                    <div class="emoji">💼</div>
                    <div class="name">Pro</div>
                </div>
                <div class="select-btn" data-value="playful">
                    <div class="emoji">🎮</div>
                    <div class="name">Playful</div>
                </div>
                <div class="select-btn" data-value="wise">
                    <div class="emoji">🦉</div>
                    <div class="name">Wise</div>
                </div>
            </div>

            <div class="section-label">Voice</div>
            <div class="select-row" id="voiceRow">
                <div class="select-btn selected" data-value="samantha">
                    <div class="emoji">🎙</div>
                    <div class="name">Samantha</div>
                </div>
                <div class="select-btn" data-value="alex">
                    <div class="emoji">🎤</div>
                    <div class="name">Alex</div>
                </div>
                <div class="select-btn" data-value="daniel">
                    <div class="emoji">📢</div>
                    <div class="name">Daniel</div>
                </div>
                <div class="select-btn" data-value="karen">
                    <div class="emoji">🔊</div>
                    <div class="name">Karen</div>
                </div>
            </div>

            <button class="btn-start" onclick="startChat()">Start Chatting</button>

            <div class="divider">or save your data</div>

            <div class="form-group">
                <input type="email" id="email" placeholder="Email">
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="Password">
            </div>
            <button class="btn-account" onclick="createAccount()">Create Account</button>
        </div>
    </div>

    <!-- Chat -->
    <div class="chat-container" id="chatScreen">
        <div class="chat-header">
            <div class="chat-header-left">
                <div class="avatar" id="botAvatar">😊</div>
                <div class="chat-header-info">
                    <h2 id="botName">Buddy</h2>
                    <p>● Online</p>
                </div>
            </div>
            <div class="chat-header-right">
                <span class="memory-count" id="memoryCount">0 memories</span>
                <button class="icon-btn active" id="voiceBtn" onclick="toggleVoice()">🔊</button>
                <button class="icon-btn" onclick="logout()">←</button>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages"></div>

        <div class="typing-indicator" id="typingIndicator">
            <span></span><span></span><span></span>
        </div>

        <div class="chat-input-area">
            <div class="input-wrapper">
                <textarea class="chat-input" id="chatInput" placeholder="Message..." rows="1" onkeydown="handleKey(event)"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">→</button>
            </div>
        </div>
    </div>

    <script>
        const API = window.location.origin;
        let user = null;
        let convId = null;
        let voiceOn = true;
        let personality = 'friendly';
        let voice = 'samantha';

        // Selection handlers
        document.querySelectorAll('#personalityRow .select-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('#personalityRow .select-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                personality = btn.dataset.value;
            };
        });

        document.querySelectorAll('#voiceRow .select-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('#voiceRow .select-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                voice = btn.dataset.value;
            };
        });

        function startChat() {
            const name = document.getElementById('username').value.trim() || 'Friend';
            user = {
                userId: 'v_' + Date.now().toString(36) + Math.random().toString(36).substr(2,4),
                username: name,
                personality: personality,
                voice: voice,
                guest: true,
                created: new Date().toISOString()
            };
            localStorage.setItem('rb_user', JSON.stringify(user));
            showChat();
            greet();
            fetch(`${API}/api/v1/analytics/opt-in`, { method: 'POST' }).catch(() => {});
        }

        async function createAccount() {
            const name = document.getElementById('username').value.trim() || 'Friend';
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;

            if (!email || !pass) { alert('Enter email and password'); return; }
            if (pass.length < 6) { alert('Password: 6+ characters'); return; }

            const hash = await hashPw(pass);
            const accounts = JSON.parse(localStorage.getItem('rb_accounts') || '{}');

            if (accounts[email]) {
                if (accounts[email].hash !== hash) { alert('Wrong password'); return; }
                user = accounts[email];
                user.personality = personality;
                user.voice = voice;
            } else {
                user = {
                    userId: email.replace(/[^a-z0-9]/gi, '_') + '_' + Date.now().toString(36),
                    username: name,
                    email: email,
                    hash: hash,
                    personality: personality,
                    voice: voice,
                    guest: false,
                    created: new Date().toISOString()
                };
                accounts[email] = user;
                localStorage.setItem('rb_accounts', JSON.stringify(accounts));
            }

            localStorage.setItem('rb_user', JSON.stringify(user));
            showChat();
            greet();
        }

        async function hashPw(p) {
            const d = new TextEncoder().encode(p);
            const h = await crypto.subtle.digest('SHA-256', d);
            return Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2,'0')).join('');
        }

        function speak(text) {
            if (!voiceOn || !speechSynthesis) return;
            speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            const voices = speechSynthesis.getVoices();
            const map = { samantha: 'Samantha', alex: 'Alex', daniel: 'Daniel', karen: 'Karen' };
            const v = voices.find(x => x.name.includes(map[user?.voice || 'samantha'])) || voices[0];
            if (v) u.voice = v;
            speechSynthesis.speak(u);
        }

        function toggleVoice() {
            voiceOn = !voiceOn;
            const btn = document.getElementById('voiceBtn');
            btn.textContent = voiceOn ? '🔊' : '🔇';
            btn.classList.toggle('active', voiceOn);
            if (!voiceOn) speechSynthesis.cancel();
            localStorage.setItem('rb_voice', voiceOn ? '1' : '0');
        }

        function checkAuth() {
            const s = localStorage.getItem('rb_user');
            if (s) { user = JSON.parse(s); showChat(); greet(); }
            if (localStorage.getItem('rb_voice') === '0') {
                voiceOn = false;
                const btn = document.getElementById('voiceBtn');
                if (btn) { btn.textContent = '🔇'; btn.classList.remove('active'); }
            }
        }

        function showChat() {
            document.getElementById('setupScreen').classList.add('hidden');
            document.getElementById('chatScreen').style.display = 'flex';
            document.getElementById('chatInput').focus();

            const avatars = { friendly: '😊', professional: '💼', playful: '🎮', wise: '🦉' };
            document.getElementById('botAvatar').textContent = avatars[user.personality] || '🤖';
            document.getElementById('botName').textContent = user.username === 'Friend' ? 'Buddy' : `${user.username}'s Buddy`;

            loadMemories();
        }

        async function greet() {
            try {
                const r = await fetch(`${API}/api/v1/greeting/${user.userId}`);
                const d = await r.json();
                addMsg(d.greeting || defaultGreet(), 'bot');
            } catch { addMsg(defaultGreet(), 'bot'); }
        }

        function defaultGreet() {
            const n = user.username || 'there';
            const g = {
                friendly: `Hey ${n}! Ready to chat. I'll remember everything.`,
                professional: `Hello ${n}. How can I assist you today?`,
                playful: `${n}! Let's have some fun! What's up?`,
                wise: `Greetings ${n}. What shall we explore today?`
            };
            return g[user.personality] || g.friendly;
        }

        async function loadMemories() {
            try {
                const r = await fetch(`${API}/api/v1/memories/${user.userId}?limit=100`);
                const m = await r.json();
                document.getElementById('memoryCount').textContent = `${m.length} memories`;
            } catch {}
        }

        function addMsg(text, type) {
            const msgs = document.getElementById('chatMessages');
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const div = document.createElement('div');
            div.className = `message message-${type}`;
            div.innerHTML = `${text}<div class="message-time">${time}</div>`;
            msgs.appendChild(div);
            msgs.scrollTop = msgs.scrollHeight;
            if (type === 'bot') speak(text);
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            input.style.height = 'auto';
            addMsg(text, 'user');

            const typing = document.getElementById('typingIndicator');
            typing.style.display = 'block';
            document.getElementById('sendBtn').disabled = true;

            try {
                const r = await fetch(`${API}/api/v1/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: user.userId,
                        message: text,
                        conversation_id: convId,
                        personality: user.personality
                    })
                });
                const d = await r.json();
                convId = d.conversation_id;
                typing.style.display = 'none';
                addMsg(d.response, 'bot');
                if (d.memories_created > 0) loadMemories();
            } catch {
                typing.style.display = 'none';
                addMsg("Connection error. Try again.", 'bot');
            }

            document.getElementById('sendBtn').disabled = false;
            input.focus();
        }

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        }

        document.getElementById('chatInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });

        function logout() {
            localStorage.removeItem('rb_user');
            user = null;
            convId = null;
            document.getElementById('chatMessages').innerHTML = '';
            document.getElementById('chatScreen').style.display = 'none';
            document.getElementById('setupScreen').classList.remove('hidden');
        }

        if (speechSynthesis) {
            speechSynthesis.getVoices();
            speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
        }
        checkAuth();
    </script>
</body>
</html>
