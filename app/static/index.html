<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoboBuddy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1a0033 0%, #0d001a 25%, #001a1a 50%, #0d1a00 75%, #1a0033 100%);
            background-size: 400% 400%;
            animation: gradientWave 15s ease infinite;
            min-height: 100vh;
            color: #f5f5f5;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(255, 0, 128, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(0, 255, 200, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(128, 0, 255, 0.1) 0%, transparent 60%);
            animation: glowPulse 8s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes gradientWave {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes glowPulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .setup-container, .chat-container {
            position: relative;
            z-index: 1;
        }

        /* Setup Screen */
        .setup-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .setup-box {
            background: rgba(20, 20, 30, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 48px;
            width: 100%;
            max-width: 440px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .mascot {
            width: 120px;
            height: 140px;
            margin: 0 auto 24px;
            position: relative;
        }

        .robot-head {
            width: 100px;
            height: 80px;
            background: linear-gradient(180deg, #1a1a2a 0%, #12121a 100%);
            border-radius: 20px 20px 30px 30px;
            position: relative;
            margin: 0 auto;
            border: 2px solid #00d4aa;
            box-shadow:
                0 0 20px rgba(0, 212, 170, 0.3),
                inset 0 -10px 20px rgba(0,0,0,0.3);
        }

        .robot-antenna {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, #00d4aa, #0088ff);
            border-radius: 2px;
        }

        .robot-antenna::before {
            content: '';
            position: absolute;
            top: -8px;
            left: -6px;
            width: 16px;
            height: 16px;
            background: radial-gradient(circle, #00ffcc 0%, #00d4aa 50%, transparent 70%);
            border-radius: 50%;
            animation: antennaPulse 1.5s ease-in-out infinite;
        }

        @keyframes antennaPulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        .robot-visor {
            position: absolute;
            top: 20px;
            left: 10px;
            right: 10px;
            height: 28px;
            background: linear-gradient(180deg, #0a0a12 0%, #151520 100%);
            border-radius: 6px;
            border: 1px solid #00d4aa;
            overflow: hidden;
        }

        .robot-eyes {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            gap: 20px;
        }

        .robot-eye {
            width: 16px;
            height: 16px;
            background: #00ffcc;
            border-radius: 3px;
            animation: eyeScan 3s ease-in-out infinite;
            box-shadow: 0 0 15px #00ffcc, 0 0 30px rgba(0, 255, 204, 0.5);
        }

        .robot-eye::after {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 2px;
            top: 3px;
            left: 3px;
            opacity: 0.8;
        }

        @keyframes eyeScan {
            0%, 100% { opacity: 1; }
            10% { opacity: 0.3; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            90% { opacity: 0.3; }
        }

        .robot-visor-line {
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 204, 0.3), transparent);
            animation: scanLine 2s linear infinite;
        }

        @keyframes scanLine {
            0% { left: -50%; }
            100% { left: 150%; }
        }

        .robot-mouth {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 3px;
        }

        .robot-mouth span {
            width: 8px;
            height: 4px;
            background: #00d4aa;
            border-radius: 1px;
            animation: mouthPulse 1s ease-in-out infinite;
        }

        .robot-mouth span:nth-child(2) { animation-delay: 0.1s; height: 6px; }
        .robot-mouth span:nth-child(3) { animation-delay: 0.2s; }
        .robot-mouth span:nth-child(4) { animation-delay: 0.3s; height: 6px; }
        .robot-mouth span:nth-child(5) { animation-delay: 0.4s; }

        @keyframes mouthPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .robot-neck {
            width: 30px;
            height: 15px;
            background: linear-gradient(180deg, #1a1a2a, #0f0f18);
            margin: 0 auto;
            border-left: 2px solid #00d4aa;
            border-right: 2px solid #00d4aa;
        }

        .robot-body {
            width: 70px;
            height: 35px;
            background: linear-gradient(180deg, #1a1a2a 0%, #12121a 100%);
            border-radius: 10px 10px 20px 20px;
            margin: 0 auto;
            border: 2px solid #00d4aa;
            position: relative;
            box-shadow: 0 0 15px rgba(0, 212, 170, 0.2);
        }

        .robot-chest-light {
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, #00ffcc 0%, #00d4aa 40%, transparent 70%);
            border-radius: 50%;
            animation: chestPulse 2s ease-in-out infinite;
        }

        @keyframes chestPulse {
            0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.2); }
        }

        .logo h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #00ffcc, #00aaff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .logo p {
            color: rgba(255,255,255,0.6);
            font-size: 15px;
            margin-top: 8px;
        }

        .section-label {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255,255,255,0.5);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #00d4aa;
        }

        .form-group input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        /* Selection Grid */
        .select-row {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        .select-btn {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .select-btn:hover {
            border-color: rgba(255,255,255,0.3);
        }

        .select-btn.selected {
            border-color: #00d4aa;
            background: rgba(0, 212, 170, 0.15);
        }

        .select-btn .emoji {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .select-btn .name {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }

        .select-btn.selected .name {
            color: #00d4aa;
        }

        /* Buttons */
        .btn-start {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, #00d4aa, #00aaff);
            color: #0a0a0f;
            transition: all 0.3s;
            margin-top: 8px;
            box-shadow: 0 4px 20px rgba(0, 212, 170, 0.3);
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 212, 170, 0.5);
        }

        .divider {
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            margin: 28px 0;
            position: relative;
        }

        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 35%;
            height: 1px;
            background: rgba(255,255,255,0.15);
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .btn-account {
            width: 100%;
            padding: 14px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            background: transparent;
            color: rgba(255,255,255,0.6);
            transition: all 0.2s;
        }

        .btn-account:hover {
            border-color: #00d4aa;
            color: #00d4aa;
        }

        /* Chat Screen */
        .chat-container {
            display: none;
            flex-direction: column;
            height: 100vh;
            background: transparent;
        }

        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: rgba(20, 20, 30, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, #00d4aa, #00aaff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .chat-header-info h2 {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }

        .chat-header-info p {
            font-size: 12px;
            color: #00d4aa;
        }

        .chat-header-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .icon-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }

        .icon-btn.active {
            background: linear-gradient(135deg, #00d4aa, #00aaff);
            color: #0a0a0f;
        }

        .memory-count {
            background: rgba(0, 212, 170, 0.2);
            color: #00d4aa;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .memory-count:hover {
            background: rgba(0, 212, 170, 0.35);
            border-color: #00d4aa;
        }

        /* Reply Length Toggle */
        .reply-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .reply-toggle-label {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
        }

        .reply-toggle-btns {
            display: flex;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 2px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .reply-toggle-btn {
            padding: 6px 14px;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .reply-toggle-btn.active {
            background: linear-gradient(135deg, #ff00aa, #00ffaa);
            color: #0a0a0f;
        }

        .reply-toggle-btn:hover:not(.active) {
            color: #fff;
        }

        /* Memory Modal */
        .memory-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .memory-modal.show {
            display: flex;
        }

        .memory-modal-content {
            background: rgba(30, 20, 40, 0.95);
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 500px;
            max-height: 70vh;
            overflow-y: auto;
            border: 1px solid rgba(255,0,200,0.3);
            box-shadow: 0 20px 60px rgba(255,0,128,0.2);
        }

        .memory-modal h3 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #ff00aa;
        }

        .memory-item {
            background: rgba(0,0,0,0.3);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 3px solid #00ffaa;
        }

        .memory-item p {
            font-size: 14px;
            color: rgba(255,255,255,0.8);
        }

        .memory-item .time {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            margin-top: 6px;
        }

        .memory-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
        }

        .save-memory-btn {
            background: linear-gradient(135deg, #ff00aa, #aa00ff);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            color: #fff;
            font-weight: 500;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.2s;
        }

        .save-memory-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(255,0,170,0.4);
        }

        .memory-input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 14px;
            margin-top: 12px;
        }

        .memory-input:focus {
            outline: none;
            border-color: #ff00aa;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 70%;
            padding: 14px 18px;
            border-radius: 16px;
            line-height: 1.5;
            font-size: 15px;
            animation: slideIn 0.2s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-user {
            background: linear-gradient(135deg, #00d4aa, #00aaff);
            color: #0a0a0f;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message-bot {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            margin-top: 6px;
        }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            padding: 16px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
        }

        .typing-indicator span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #00d4aa;
            border-radius: 50%;
            margin-right: 4px;
            animation: typingPulse 1.2s infinite;
        }

        @keyframes typingPulse {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes pulse {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }

        .chat-input-area {
            padding: 16px 24px;
            background: rgba(20, 20, 30, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            max-width: 800px;
            margin: 0 auto;
        }

        .chat-input {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 15px;
            resize: none;
            max-height: 100px;
        }

        .chat-input:focus {
            outline: none;
            border-color: #00d4aa;
        }

        .send-btn {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, #00d4aa, #00aaff);
            border: none;
            color: #0a0a0f;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0, 212, 170, 0.3);
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 212, 170, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .setup-box { padding: 32px 24px; }
            .select-btn .name { font-size: 11px; }
            .message { max-width: 85%; }
            .memory-count { display: none; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- Setup -->
    <div class="setup-container" id="setupScreen">
        <div class="setup-box">
            <div class="logo">
                <div class="mascot">
                    <div class="robot-head">
                        <div class="robot-antenna"></div>
                        <div class="robot-visor">
                            <div class="robot-visor-line"></div>
                            <div class="robot-eyes">
                                <div class="robot-eye"></div>
                                <div class="robot-eye"></div>
                            </div>
                        </div>
                        <div class="robot-mouth">
                            <span></span><span></span><span></span><span></span><span></span>
                        </div>
                    </div>
                    <div class="robot-neck"></div>
                    <div class="robot-body">
                        <div class="robot-chest-light"></div>
                    </div>
                </div>
                <h1>RoboBuddy</h1>
                <p>AI that remembers you</p>
            </div>

            <div class="section-label">Your name</div>
            <div class="form-group">
                <input type="text" id="username" placeholder="What should I call you?">
            </div>

            <div class="section-label">Name your buddy</div>
            <div class="form-group">
                <input type="text" id="buddyName" placeholder="Sage, Max, Luna, etc.">
            </div>

            <div class="section-label">Personality</div>
            <div class="select-row" id="personalityRow">
                <div class="select-btn selected" data-value="friendly">
                    <div class="emoji">😊</div>
                    <div class="name">Friendly</div>
                </div>
                <div class="select-btn" data-value="professional">
                    <div class="emoji">💼</div>
                    <div class="name">Pro</div>
                </div>
                <div class="select-btn" data-value="playful">
                    <div class="emoji">🎮</div>
                    <div class="name">Playful</div>
                </div>
                <div class="select-btn" data-value="wise">
                    <div class="emoji">🦉</div>
                    <div class="name">Wise</div>
                </div>
            </div>

            <div class="section-label">Voice</div>
            <div class="select-row" id="voiceRow">
                <div class="select-btn selected" data-value="samantha">
                    <div class="emoji">🎙</div>
                    <div class="name">Samantha</div>
                </div>
                <div class="select-btn" data-value="alex">
                    <div class="emoji">🎤</div>
                    <div class="name">Alex</div>
                </div>
                <div class="select-btn" data-value="daniel">
                    <div class="emoji">📢</div>
                    <div class="name">Daniel</div>
                </div>
                <div class="select-btn" data-value="karen">
                    <div class="emoji">🔊</div>
                    <div class="name">Karen</div>
                </div>
            </div>

            <button class="btn-start" onclick="startChat()">Start Chatting</button>

            <div class="divider">or save your data</div>

            <div class="form-group">
                <input type="email" id="email" placeholder="Email">
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="Password">
            </div>
            <button class="btn-account" onclick="createAccount()">Create Account</button>
        </div>
    </div>

    <!-- Chat -->
    <div class="chat-container" id="chatScreen">
        <div class="chat-header">
            <div class="chat-header-left">
                <div class="avatar" id="botAvatar">😊</div>
                <div class="chat-header-info">
                    <h2 id="botName">Buddy</h2>
                    <p>● Online</p>
                </div>
            </div>
            <div class="chat-header-right">
                <span class="memory-count" id="memoryCount">0 memories</span>
                <button class="icon-btn active" id="voiceBtn" onclick="toggleVoice()">🔊</button>
                <button class="icon-btn" onclick="logout()">←</button>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages"></div>

        <div class="typing-indicator" id="typingIndicator">
            <span></span><span></span><span></span>
        </div>

        <div class="chat-input-area">
            <div class="reply-toggle">
                <span class="reply-toggle-label">Replies:</span>
                <div class="reply-toggle-btns">
                    <button class="reply-toggle-btn active" id="shortBtn" onclick="setReplyLength('short')">Short</button>
                    <button class="reply-toggle-btn" id="longBtn" onclick="setReplyLength('long')">Detailed</button>
                </div>
            </div>
            <div class="input-wrapper">
                <textarea class="chat-input" id="chatInput" placeholder="Message..." rows="1" onkeydown="handleKey(event)"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">→</button>
            </div>
        </div>
    </div>

    <!-- Memory Modal -->
    <div class="memory-modal" id="memoryModal" onclick="closeMemoryModal(event)">
        <div class="memory-modal-content" onclick="event.stopPropagation()">
            <h3>🧠 Key Memories</h3>
            <div id="memoryList"></div>
            <input type="text" class="memory-input" id="newMemoryInput" placeholder="Save a key point from our chat...">
            <button class="save-memory-btn" onclick="saveMemory()">💾 Save to Memory</button>
        </div>
    </div>

    <script>
        const API = window.location.origin;
        let user = null;
        let convId = null;
        let voiceOn = true;
        let personality = 'friendly';
        let voice = 'samantha';
        let replyLength = 'short'; // 'short' or 'long'

        // Selection handlers
        document.querySelectorAll('#personalityRow .select-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('#personalityRow .select-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                personality = btn.dataset.value;
            };
        });

        document.querySelectorAll('#voiceRow .select-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('#voiceRow .select-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                voice = btn.dataset.value;
            };
        });

        function startChat() {
            const name = document.getElementById('username').value.trim() || 'Friend';
            const buddyName = document.getElementById('buddyName').value.trim() || 'Buddy';
            user = {
                userId: 'v_' + Date.now().toString(36) + Math.random().toString(36).substr(2,4),
                username: name,
                buddyName: buddyName,
                personality: personality,
                voice: voice,
                guest: true,
                created: new Date().toISOString()
            };
            localStorage.setItem('rb_user', JSON.stringify(user));
            showChat();
            greet();
            fetch(`${API}/api/v1/analytics/opt-in`, { method: 'POST' }).catch(() => {});
        }

        async function createAccount() {
            const name = document.getElementById('username').value.trim() || 'Friend';
            const buddyName = document.getElementById('buddyName').value.trim() || 'Buddy';
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;

            if (!email || !pass) { alert('Enter email and password'); return; }
            if (pass.length < 6) { alert('Password: 6+ characters'); return; }

            const hash = await hashPw(pass);
            const accounts = JSON.parse(localStorage.getItem('rb_accounts') || '{}');

            if (accounts[email]) {
                if (accounts[email].hash !== hash) { alert('Wrong password'); return; }
                user = accounts[email];
                user.personality = personality;
                user.voice = voice;
                user.buddyName = buddyName;
            } else {
                user = {
                    userId: email.replace(/[^a-z0-9]/gi, '_') + '_' + Date.now().toString(36),
                    username: name,
                    buddyName: buddyName,
                    email: email,
                    hash: hash,
                    personality: personality,
                    voice: voice,
                    guest: false,
                    created: new Date().toISOString()
                };
                accounts[email] = user;
                localStorage.setItem('rb_accounts', JSON.stringify(accounts));
            }

            localStorage.setItem('rb_user', JSON.stringify(user));
            showChat();
            greet();
        }

        async function hashPw(p) {
            const d = new TextEncoder().encode(p);
            const h = await crypto.subtle.digest('SHA-256', d);
            return Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2,'0')).join('');
        }

        function speak(text) {
            if (!voiceOn || !speechSynthesis) return;
            speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            const voices = speechSynthesis.getVoices();
            const map = { samantha: 'Samantha', alex: 'Alex', daniel: 'Daniel', karen: 'Karen' };
            const v = voices.find(x => x.name.includes(map[user?.voice || 'samantha'])) || voices[0];
            if (v) u.voice = v;
            speechSynthesis.speak(u);
        }

        function toggleVoice() {
            voiceOn = !voiceOn;
            const btn = document.getElementById('voiceBtn');
            btn.textContent = voiceOn ? '🔊' : '🔇';
            btn.classList.toggle('active', voiceOn);
            if (!voiceOn) speechSynthesis.cancel();
            localStorage.setItem('rb_voice', voiceOn ? '1' : '0');
        }

        function checkAuth() {
            const s = localStorage.getItem('rb_user');
            if (s) { user = JSON.parse(s); showChat(); greet(); }
            if (localStorage.getItem('rb_voice') === '0') {
                voiceOn = false;
                const btn = document.getElementById('voiceBtn');
                if (btn) { btn.textContent = '🔇'; btn.classList.remove('active'); }
            }
        }

        function showChat() {
            document.getElementById('setupScreen').classList.add('hidden');
            document.getElementById('chatScreen').style.display = 'flex';
            document.getElementById('chatInput').focus();

            const avatars = { friendly: '😊', professional: '💼', playful: '🎮', wise: '🦉' };
            document.getElementById('botAvatar').textContent = avatars[user.personality] || '🤖';
            document.getElementById('botName').textContent = user.buddyName || 'Buddy';

            loadMemories();
        }

        async function greet() {
            try {
                const r = await fetch(`${API}/api/v1/greeting/${user.userId}`);
                const d = await r.json();
                addMsg(d.greeting || defaultGreet(), 'bot');
            } catch { addMsg(defaultGreet(), 'bot'); }
        }

        function defaultGreet() {
            const n = user.username || 'there';
            const b = user.buddyName || 'Buddy';
            const g = {
                friendly: `Hey ${n}! I'm ${b}. Ready to chat and I'll remember everything we talk about.`,
                professional: `Hello ${n}. I'm ${b}, your assistant. How can I help you today?`,
                playful: `${n}! I'm ${b}! Let's have some fun! What's up?`,
                wise: `Greetings ${n}. I am ${b}. What shall we explore together today?`
            };
            return g[user.personality] || g.friendly;
        }

        async function loadMemories() {
            try {
                const r = await fetch(`${API}/api/v1/memories/${user.userId}?limit=100`);
                const m = await r.json();
                document.getElementById('memoryCount').textContent = `${m.length} memories`;
            } catch {}
        }

        function addMsg(text, type) {
            const msgs = document.getElementById('chatMessages');
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const div = document.createElement('div');
            div.className = `message message-${type}`;
            div.innerHTML = `${text}<div class="message-time">${time}</div>`;
            msgs.appendChild(div);
            msgs.scrollTop = msgs.scrollHeight;
            if (type === 'bot') speak(text);
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            input.style.height = 'auto';
            addMsg(text, 'user');

            const typing = document.getElementById('typingIndicator');
            typing.style.display = 'block';
            document.getElementById('sendBtn').disabled = true;

            try {
                const r = await fetch(`${API}/api/v1/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: user.userId,
                        message: text,
                        conversation_id: convId,
                        personality: user.personality,
                        reply_length: replyLength
                    })
                });
                const d = await r.json();
                convId = d.conversation_id;
                typing.style.display = 'none';
                addMsg(d.response, 'bot');
                if (d.memories_created > 0) loadMemories();
            } catch {
                typing.style.display = 'none';
                addMsg("Connection error. Try again.", 'bot');
            }

            document.getElementById('sendBtn').disabled = false;
            input.focus();
        }

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        }

        document.getElementById('chatInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });

        function logout() {
            localStorage.removeItem('rb_user');
            user = null;
            convId = null;
            document.getElementById('chatMessages').innerHTML = '';
            document.getElementById('chatScreen').style.display = 'none';
            document.getElementById('setupScreen').classList.remove('hidden');
        }

        // Reply length toggle
        function setReplyLength(len) {
            replyLength = len;
            document.getElementById('shortBtn').classList.toggle('active', len === 'short');
            document.getElementById('longBtn').classList.toggle('active', len === 'long');
            localStorage.setItem('rb_reply_length', len);
        }

        // Memory modal functions
        function openMemoryModal() {
            document.getElementById('memoryModal').classList.add('show');
            loadMemoryList();
        }

        function closeMemoryModal(e) {
            if (e.target.id === 'memoryModal') {
                document.getElementById('memoryModal').classList.remove('show');
            }
        }

        async function loadMemoryList() {
            const list = document.getElementById('memoryList');
            list.innerHTML = '<p style="color: rgba(255,255,255,0.5);">Loading...</p>';

            try {
                const r = await fetch(`${API}/api/v1/memories/${user.userId}?limit=20`);
                const memories = await r.json();

                if (memories.length === 0) {
                    list.innerHTML = '<p style="color: rgba(255,255,255,0.5);">No memories saved yet. Chat more or save key points below!</p>';
                } else {
                    list.innerHTML = memories.map(m => `
                        <div class="memory-item">
                            <p>${m.content || m.memory || m.text || JSON.stringify(m)}</p>
                            <div class="time">${m.created_at ? new Date(m.created_at).toLocaleString() : ''}</div>
                        </div>
                    `).join('');
                }
            } catch {
                list.innerHTML = '<p style="color: rgba(255,255,255,0.5);">Could not load memories.</p>';
            }
        }

        async function saveMemory() {
            const input = document.getElementById('newMemoryInput');
            const text = input.value.trim();
            if (!text) return;

            try {
                await fetch(`${API}/api/v1/memories`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: user.userId,
                        content: text,
                        type: 'manual'
                    })
                });
                input.value = '';
                loadMemoryList();
                loadMemories();
            } catch {
                alert('Could not save memory');
            }
        }

        // Wire up memory count click
        document.getElementById('memoryCount').onclick = openMemoryModal;

        // Load saved reply length
        const savedLen = localStorage.getItem('rb_reply_length');
        if (savedLen) setReplyLength(savedLen);

        if (speechSynthesis) {
            speechSynthesis.getVoices();
            speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
        }
        checkAuth();
    </script>
</body>
</html>
